name: Deploy MultiDocker
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - run: docker build -t daisoai/react-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true daisoai/react-test npm test

      - run: docker build -t daisoai/multi-client ./client
      - run: docker build -t daisoai/multi-nginx ./nginx
      - run: docker build -t daisoai/multi-server ./server
      - run: docker build -t daisoai/multi-worker ./worker

      - run: docker push daisoai/multi-client
      - run: docker push daisoai/multi-nginx
      - run: docker push daisoai/multi-server
      - run: docker push daisoai/multi-worker
