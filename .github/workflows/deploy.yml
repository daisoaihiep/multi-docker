name: Deploy MultiDocker
on:
  push:
    branches:
      - master # check your repo, your default branch might be master!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin 
      - run: docker build -t batluongsoai/react-test-up -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true batluongsoai/react-test-up npm test

      - run: docker build -t batluongsoai/multi-client-up ./client
      - run: docker build -t batluongsoai/multi-nginx-up ./nginx
      - run: docker build -t batluongsoai/multi-server-up ./server
      - run: docker build -t batluongsoai/multi-worker-up ./worker

      - run: docker push batluongsoai/multi-client-up
      - run: docker push batluongsoai/multi-nginx-up
      - run: docker push batluongsoai/multi-server-up
      - run: docker push batluongsoai/multi-worker-up