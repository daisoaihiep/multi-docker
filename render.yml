services:
  - type: web
    name: multi-nginx
    runtime: docker
    rootDir: nginx
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore

  - type: web
    name: multi-server
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: REDIS_HOST
        fromService:
          name: multi-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: multi-redis
          type: redis
          property: port
      - key: DATABASE_URL
        fromDatabase:
          name: multi-postgres
          property: connectionString

  - type: worker
    name: multi-worker
    runtime: docker
    rootDir: worker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: REDIS_HOST
        fromService:
          name: multi-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: multi-redis
          type: redis
          property: port

  - type: redis
    name: multi-redis
    plan: free
    region: singapore
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

databases:
  - name: multi-postgres
    databaseName: values
    plan: free
    region: singapore